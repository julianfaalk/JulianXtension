<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>X Themes</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div class="title-block">
          <p class="eyebrow">X Themes</p>
          <h1 id="status">Wähle ein Theme</h1>
          <p id="hint" class="hint">Klick auf eine Karte, um sie auf X.com anzuwenden.</p>
        </div>
        <button id="clearBtn" type="button" class="clear-btn" title="Theme entfernen">Reset</button>
      </header>

      <div id="themeList" class="theme-list" aria-label="Themes"></div>

      <p id="message" class="message" role="status"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
